      <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="nav-links">
        <a href="index.html" >Home</a>

        <a href="services.html" >Services</a>
        <a href="contact.html" class="active">Contact</a>

    </div>
  </nav>
  <section class="page-hero"><div class="container"><h1 class="animate-on-scroll">Let's Talk</h1></div></section>
  <section class="section"><div class="container grid-2">
    <div class="animate-on-scroll">
      <h2>Visit Our Office</h2>
      <p style="color:var(--text-muted);margin-bottom:20px">We operate in the greater Pacific Northwest area.</p>
      <div class="map-wrapper">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2689.6!2d-122.33!3d47.60!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDfCszM2JzAwLjAiTiAxMjLCsDE5JzQ4LjAiVw!5e0!3m2!1sen!2sus!4v1" width="100%" height="300" style="border:0;border-radius:12px" allowfullscreen loading="lazy"></iframe>

    </div>
    <div class="form-container animate-on-scroll">
      <form class="contact-form">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email Address" required>
        <select><option>New Design Project</option><option>Renovation</option><option>Maintenance</option></select>
        <textarea placeholder="Tell us about your outdoor space..." rows="5"></textarea>
        <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
      </form>
    </div>
  </div></section>
  <footer class="footer"><div class="container"><p>&copy; 2026 GreenSpaces Landscaping. Bringing nature home.</p></div></footer>
