<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Arthur Pendelton</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Arthur<span>Pendelton</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="properties.html">Properties</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
      <button class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="section" style="padding-top: 150px; min-height: 100vh;">
    <div class="container">
      <div class="section-header reveal">
        <span class="section-tag">Private Inquiries</span>
        <h1 class="section-title">Get In Touch</h1>
      </div>

      <div style="max-width: 700px; margin: 0 auto; background: var(--bg-secondary); padding: 50px; box-shadow: var(--shadow);" class="reveal">
        <form id="contact-form">
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-family: var(--font-heading); color: var(--bg-dark);">Full Name</label>
            <input type="text" name="name" required style="width: 100%; padding: 15px; border: 1px solid var(--border-color); font-family: var(--font-body);">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-family: var(--font-heading); color: var(--bg-dark);">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 15px; border: 1px solid var(--border-color); font-family: var(--font-body);">
          </div>
          <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px; font-family: var(--font-heading); color: var(--bg-dark);">Inquiry Type</label>
            <select name="type" style="width: 100%; padding: 15px; border: 1px solid var(--border-color); font-family: var(--font-body);">
              <option>Interested in Buying</option>
              <option>Interested in Selling</option>
              <option>General Inquiry</option>
            </select>
          </div>
          <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 5px; font-family: var(--font-heading); color: var(--bg-dark);">Message</label>
            <textarea name="message" required style="width: 100%; padding: 15px; border: 1px solid var(--border-color); min-height: 150px; font-family: var(--font-body);"></textarea>
          </div>
          <button type="submit" class="btn" style="width: 100%;">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 Arthur Pendelton Real Estate. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
