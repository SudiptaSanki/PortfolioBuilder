<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Alex Carter</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("YOUR_PUBLIC_KEY");</script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23000000'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%23e50914' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Alex<span>Carter</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="work.html">Work</a>
        <a href="contact.html" class="active">Contact</a>
      </div>
      <button class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Let's Roll</h1>
      <p>Available for freelance projects worldwide.</p>
    </div>
  </header>

  <section class="section">
    <div class="container contact-container reveal">
      
      <div style="text-align: center; margin-bottom: 50px;">
        <h3 style="font-family: var(--font-heading); font-size: 2rem; color: var(--accent-secondary); margin-bottom: 10px;">Booking & Inquiries</h3>
        <p style="color: var(--text-secondary);">Fill out the form below or email me directly at <span style="color: #fff;">booking@alexcarter.film</span></p>
      </div>

      <form class="contact-form" id="contact-form">
        <div id="form-status" class="form-status"></div>
        <div class="form-group">
          <input type="text" name="name" placeholder="YOUR NAME" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="YOUR EMAIL" required>
        </div>
        <div class="form-group">
          <input type="text" name="subject" placeholder="PROJECT TYPE (e.g. Music Video)">
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="PROJECT DETAILS" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send Transmission</button>
      </form>

    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="social-links">
        <a href="#">Vimeo</a>
        <a href="#">YouTube</a>
        <a href="#">Instagram</a>
      </div>
      <p style="margin-top: 20px;">&copy; 2025 Alex Carter. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
