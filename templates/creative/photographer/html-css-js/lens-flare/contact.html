<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking &amp; Contact | CAPTURE Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2318181b'/%3E%3Ctext x='50' y='67' font-family='serif' font-size='60' font-weight='bold' fill='%23dfb15b' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="flash-overlay"></div>

    <header class="exif-notch-wrapper">
        <nav class="exif-notch-nav">
            <a href="index.html" class="brand-logo">C.</a>

            <div class="camera-exif-island">
                <span class="camera-rec-dot"></span>
                <span>BOOKING PORTAL</span>
                <span style="color: rgba(255,255,255,0.2);">|</span>
                <button id="shutterAudioBtn" class="shutter-sound-toggle">[ 🔊 SHUTTER AUDIO: ON ]</button>
            </div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Gallery</a></li>
                <li><a href="about.html">About &amp; Gear</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Booking</a></li>
            </ul>

            <a href="contact.html" class="btn-book-now">BOOK SESSION</a>
            <button class="mobile-toggle" id="mobileToggle">☰</button>
        </nav>
    </header>

    <div class="page-wrapper">
        <section class="section">
            <header class="hero-header">
                <h1 class="hero-title">Book a <em>Session</em></h1>
                <p class="hero-subtitle">Currently accepting commissions for Q3/Q4. Please fill out the booking details below.</p>
            </header>

            <div class="contact-card">
                <form id="bookingForm">
                    <div class="form-group">
                        <label class="form-label">FULL NAME *</label>
                        <input type="text" class="form-input" required placeholder="Elena Rostova">
                    </div>
                    <div class="form-group">
                        <label class="form-label">EMAIL ADDRESS *</label>
                        <input type="email" class="form-input" required placeholder="elena@vogue.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">PROJECT / SESSION TYPE</label>
                        <select class="form-input">
                            <option>Editorial / Fashion Shoot</option>
                            <option>Commercial Architecture &amp; Real Estate</option>
                            <option>Portrait &amp; Headshot Session</option>
                            <option>Fine Art Print Inquiry</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">PREFERRED DATES &amp; LOCATION</label>
                        <input type="text" class="form-input" placeholder="e.g. October 15-20, Tokyo Studio">
                    </div>
                    <div class="form-group">
                        <label class="form-label">PROJECT DETAILS &amp; VISION</label>
                        <textarea class="form-textarea" rows="4" placeholder="Tell us about your creative concept, deliverables, and timeline..."></textarea>
                    </div>
                    <button type="submit" class="btn-book-now" style="width: 100%; padding: 14px; font-size: 1rem;">SEND BOOKING INQUIRY</button>
                </form>
            </div>
        </section>

        <footer>
            <div class="footer-content">
                <div class="brand-logo">C.</div>
                <div style="color: var(--text-muted); font-size: 0.85rem;">&copy; 2026 CAPTURE Photography. All Rights Reserved.</div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
