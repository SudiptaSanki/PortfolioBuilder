<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPTURE | Photo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1b4b'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%23f472b6' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="flash-overlay"></div>
    
    <nav class="nav">

        <div class="camera-info">ISO 400 | f/1.8 | 1/500s</div>
    </nav>
    
    <div class="gallery">
        <div class="photo-item sound-hover">
            <div class="shutter"></div>
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80" alt="Portrait">
        </div>
        <div class="photo-item sound-hover">
            <div class="shutter"></div>
            <img src="https://images.unsplash.com/photo-1554046920-90dc59e4e6f2?auto=format&fit=crop&w=800&q=80" alt="Landscape">
        </div>
        <div class="photo-item sound-hover">
            <div class="shutter"></div>
            <img src="https://images.unsplash.com/photo-1517487881594-2787fef5ebf7?auto=format&fit=crop&w=800&q=80" alt="Street">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
