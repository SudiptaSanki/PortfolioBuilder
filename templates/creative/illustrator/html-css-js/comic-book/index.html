<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POW! | Comic Illustrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e1b4b'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%23f472b6' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="comic-container">
        <header class="comic-header card-border">
            <h1 class="comic-title">ART BY BUCK!</h1>
            <div class="sub-bubble">ILLUSTRATION & CHARACTER DESIGN</div>
        </header>

        <section class="comic-grid">
            <!-- Box 1 -->
            <div class="comic-panel sound-hover card-border">
                <div class="panel-img">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=600&q=80" alt="Character sketch">
                </div>
                <div class="speech-bubble">
                    <p>I draw heroes!</p>
                </div>
            </div>

            <!-- Box 2 -->
            <div class="comic-panel sound-hover card-border yellow-bg">
                <div class="panel-img">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80" alt="Digital art">
                </div>
                <div class="speech-bubble right">
                    <p>And alien worlds...</p>
                </div>
            </div>

            <!-- Box 3 -->
            <div class="comic-panel sound-hover card-border cyan-bg">
                <div class="panel-img">
                    <img src="https://images.unsplash.com/photo-1563089145-599997674d42?auto=format&fit=crop&w=600&q=80" alt="Retro design">
                </div>
                <div class="speech-bubble">
                    <p>POW! BOOM! SMASH!</p>
                </div>
            </div>

            <!-- Box 4 -->
            <div class="comic-panel sound-hover card-border text-panel red-bg">
                <div class="panel-meta">ISSUE #42</div>
                <h2>HI HIRE ME!</h2>
                <p>Got a comic project, graphic novel, or game concept that needs heavy ink lines and pop colors? Let's team up!</p>
                <a href="mailto:buck@powillustrations.com" class="btn-bubble sound-hover">SEND SIGNAL</a>
            </div>
        </section>
    </div>
</body>
</html>
