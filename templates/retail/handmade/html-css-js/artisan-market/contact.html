<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Contact | Artisan Market</title><link rel="stylesheet" href="css/style.css"><link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23d7ccc8'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle'%3E🧶%3C/text%3E%3C/svg%3E"></head>
<body>
  
  <nav class="nav"><div class="container nav-flex">
    <a href="index.html" class="logo">Artisan<span>Market</span></a>
    <button class="menu-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-links">
      <a href="index.html" >Home</a>
      <a href="shop.html" >Shop</a>
      <a href="about.html" >About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </div></nav>
  <section class="page-hero"><div class="container"><h1 class="animate-on-scroll">Get in Touch</h1></div></section>
  <section class="section"><div class="container">
    <div class="grid-2">
      <div class="animate-on-scroll">
        <h2>Visit Our Studio</h2>
        <p style="margin-bottom:20px;color:var(--text-muted)">Open Saturdays for walk-in shopping and studio tours.</p>
        <div class="map-wrapper">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2795.5!2d-122.68!3d45.52!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDXCsDMxJzEyLjAiTiAxMjLCsDQwJzQ4LjAiVw!5e0!3m2!1sen!2sus!4v1" width="100%" height="300" style="border:0;border-radius:12px" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
      <div class="animate-on-scroll">
        <h2>Custom Orders</h2>
        <form class="contact-form">
          <input type="text" placeholder="Name" required>
          <input type="email" placeholder="Email" required>
          <textarea placeholder="Describe your custom piece (material, size, color preferences)..." rows="5" required></textarea>
          <button type="submit" class="btn btn-primary" style="width:100%">Send Request</button>
        </form>
      </div>
    </div>
  </div></section>
  <footer class="footer"><p>&copy; 2026 Artisan Market. Handmade with love.</p></footer>
  <script src="js/main.js"></script>
</body>
</html>
