<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Jason Lee</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("YOUR_PUBLIC_KEY");</script>
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">&lt;JL/&gt;</a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html"><span>01.</span>Home</a></li>
        <li><a href="about.html"><span>02.</span>About</a></li>
        <li><a href="projects.html"><span>03.</span>Projects</a></li>
        <li><a href="contact.html" class="active"><span>04.</span>Contact</a></li>
        <li><button class="theme-toggle" aria-label="Toggle theme">💡</button></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main class="container" style="padding-top: 150px; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <section class="section" style="padding-top: 0; width: 100%;">
      <div class="contact-wrap reveal">
        <p style="color: var(--accent-color); font-family: var(--font-mono); font-size: 1.1rem; margin-bottom: 10px;">04. What's Next?</p>
        <h2 style="font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 700; color: var(--text-primary); margin-bottom: 20px;">Get In Touch</h2>
        <p>Although I'm not currently looking for any new opportunities, my inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!</p>
        
        <form id="contact-form" style="margin-top: 50px;">
          <div id="form-status" class="form-status"></div>
          <div class="form-group">
            <input type="text" name="name" placeholder="Name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="Email" required>
          </div>
          <div class="form-group">
            <textarea name="message" placeholder="Message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-submit">Say Hello</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Built by Jason Lee.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
