<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-BIT DEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%2338bdf8' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div class="game-container">
        <header class="top-hud">
            <div>SCORE: <span class="blink">99999</span></div>
            <div>HI-SCORE: 99999</div>
        </header>

        <main class="main-screen">
            <h1 class="bounce-up">INSERT COIN</h1>
            <p>INDIE GAME DEVELOPER</p>
            
            <div class="menu">
                <div class="menu-item active sound-hover">> START GAME</div>
                <div class="menu-item sound-hover">  HIGH SCORES</div>
                <div class="menu-item sound-hover">  OPTIONS</div>
            </div>
            
            <div class="sprite jump-anim">👾</div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
