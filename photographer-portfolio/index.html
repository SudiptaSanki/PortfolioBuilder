<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elena Rossi | Fine Art Photographer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Elena Rossi</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <button class="theme-toggle" aria-label="Toggle theme">☾</button>
      </div>
      <button class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-slider">
      <!-- Unsplash nature/fashion images for demo -->
      <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=1920&q=80');"></div>
      <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=1920&q=80');"></div>
      <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=1920&q=80');"></div>
    </div>
    <div class="hero-content">
      <h1>Capturing Light<br>& Emotion</h1>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-header reveal">
        <p class="section-subtitle">Selected Work</p>
        <h2 class="section-title">Latest Editorial</h2>
      </div>
      
      <div class="portfolio-masonry">
        <div class="portfolio-item reveal">
          <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=800&q=80" alt="Fashion portrait">
          <div class="portfolio-overlay"><span>Editorial</span></div>
        </div>
        <div class="portfolio-item reveal">
          <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80" alt="Studio portrait">
          <div class="portfolio-overlay"><span>Portraits</span></div>
        </div>
        <div class="portfolio-item reveal">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=800&q=80" alt="Black and white portrait">
          <div class="portfolio-overlay"><span>Monochrome</span></div>
        </div>
        <div class="portfolio-item reveal">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80" alt="Fashion">
          <div class="portfolio-overlay"><span>Fashion</span></div>
        </div>
        <div class="portfolio-item reveal">
          <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=800&q=80" alt="Artistic">
          <div class="portfolio-overlay"><span>Fine Art</span></div>
        </div>
      </div>
      
      <div style="text-align: center; margin-top: 60px;" class="reveal">
        <a href="portfolio.html" class="btn-submit" style="display: inline-block;">View Full Portfolio</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-logo">Elena Rossi</div>
      <div class="social-links">
        <a href="#">Instagram</a>
        <a href="#">Behance</a>
        <a href="#">Vogue Italia</a>
      </div>
      <p>&copy; 2025 Elena Rossi Photography.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
