  <section class="contact-section">
    <div class="container">
      <div class="form-container">
        <h1>Schedule a Private Consultation</h1>
        <p>Whether you are seeking to acquire or list an architectural masterpiece, our advisors are here to assist.</p>
        <form class="contact-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <select required>
            <option value="">Interest Type</option>
            <option value="buying">Buying Property</option>
            <option value="selling">Listing Property</option>
            <option value="other">Other Inquiry</option>
          </select>
          <textarea placeholder="Please detail your requirements, timeline, and budget..." rows="5" required></textarea>
          <button type="submit" class="btn">Send Request</button>
        </form>
      </div>
    </div>
  </section>
