<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria Stone | Architect</title>
  <link rel="stylesheet" href="css/style.css">
  
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23111111'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
</head>
<body>

  <div class="split-layout">
    <!-- Left Sidebar Nav -->
    <aside class="sidebar">
      <div class="logo">Aria<span>Stone</span></div>
      <nav class="nav-links" id="nav-links">
        <a href="#projects" class="active">Selected Works</a>
        <a href="#studio">Studio</a>
        <a href="#publications">Publications</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="social-links">
        <a href="#">IG</a>
        <a href="#">IN</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </aside>

    <!-- Right Content Area -->
    <main class="content">
      <section class="hero">
        <div class="hero-image">
          <img src="https://images.unsplash.com/photo-1600607688969-a5bfcd64bd15?auto=format&fit=crop&w=1200&q=80" alt="Modern Architecture">
        </div>
        <div class="hero-text">
          <h1>Form follows function, but light defines space.</h1>
          <p>Award-winning architectural design studio based in Copenhagen.</p>
        </div>
      </section>

      <section id="projects" class="projects">
        <h2>Selected Works</h2>
        <div class="project-grid">
          <div class="project-card">
            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80" alt="Villa L">
            <div class="project-info">
              <h3>Villa L</h3>
              <span>Residential — 2025</span>
            </div>
          </div>
          <div class="project-card">
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=800&q=80" alt="The Glass Pavilion">
            <div class="project-info">
              <h3>The Glass Pavilion</h3>
              <span>Cultural — 2024</span>
            </div>
          </div>
        </div>
      </section>
      
      <footer class="footer">
        <p>&copy; 2026 Aria Stone Architecture.</p>
      </footer>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
