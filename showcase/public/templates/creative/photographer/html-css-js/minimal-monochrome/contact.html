<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Elena Rossi</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("YOUR_PUBLIC_KEY");</script>
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">Elena Rossi</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
        <button class="theme-toggle" aria-label="Toggle theme">☾</button>
      </div>
      <button class="nav-toggle" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="section" style="padding-top: 150px; min-height: 100vh; display: flex; align-items: center;">
    <div class="container contact-container reveal">
      
      <h1 class="section-title">Inquiries</h1>
      <p style="margin-bottom: 40px; color: var(--text-secondary);">For editorial assignments, print purchases, or general inquiries.</p>
      
      <form class="contact-form" id="contact-form">
        <div id="form-status" class="form-status"></div>
        <div class="form-group">
          <input type="text" name="name" placeholder="Name" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <input type="text" name="subject" placeholder="Subject">
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="Message" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Submit Inquiry</button>
      </form>
      
      <div style="margin-top: 60px;">
        <p class="section-subtitle">Representation</p>
        <p style="font-family: var(--font-heading); font-size: 1.2rem; margin-top: 10px;">Atlas Agency NY</p>
        <p style="color: var(--text-secondary);">info@atlasagency.com</p>
      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-logo">Elena Rossi</div>
      <p>&copy; 2025 Elena Rossi Photography.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
