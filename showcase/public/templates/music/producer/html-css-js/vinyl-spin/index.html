<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J Dilla | Beats</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236c7af7'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="loader">Loading tracks...</div>

    <div class="wrapper">
        <header class="header">
            <h1 class="bounce-text">BEATS.</h1>
            <h1 class="bounce-text">RHYMES.</h1>
            <h1 class="bounce-text">LIFE.</h1>
            
            <div class="audio-visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
        </header>
        
        <div class="record-player">
            <div class="record sound-hover" id="vinyl">
                <div class="record-label">
                    <span>SIDE A</span>
                </div>
                <div class="grooves"></div>
            </div>
            <div class="controls">
                <button id="playBtn" class="sound-hover">PLAY</button>
                <button id="stopBtn" class="sound-hover">STOP</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
