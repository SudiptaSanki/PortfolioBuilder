  <section class="page-hero"><div class="container"><h1 class="animate-on-scroll">Schedule an Appointment</h1></div></section>
  <section class="section"><div class="container">
    <div class="form-container animate-on-scroll">
      <form class="booking-form">
        <input type="text" placeholder="Pet Owner Name" required>
        <input type="text" placeholder="Pet Name & Breed" required>
        <select required><option value="">Select Service</option><option>Full Grooming</option><option>Spa Bath</option><option>Daycare</option><option>Overnight Boarding</option><option>Nail & Paw Care</option></select>
        <input type="date" required>
        <input type="email" placeholder="Email Address" required>
        <textarea placeholder="Special instructions or medical notes..." rows="4"></textarea>
        <button type="submit" class="btn btn-primary" style="width:100%">Book Appointment</button>
      </form>
    </div>
  </div></section>
