<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROMPT_CONSOLE // AI Systems & Prompt Architect</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f172a'/%3E%3Ctext x='50' y='67' font-family='system-ui, -apple-system, sans-serif' font-size='60' font-weight='bold' fill='%2338bdf8' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>
  
  <div class="terminal-container">
    <div class="terminal-header">
      <div class="terminal-buttons">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
      </div>
      <div class="terminal-title">guest@prompt-console:~</div>
    </div>
    
    <div class="terminal-body" id="terminal-body">
      <div class="terminal-line">// PROMPT_CONSOLE SYSTEMS ACTIVE //</div>
      <div class="terminal-line">Welcome to the interactive console portfolio of Dr. Kaelen Vance, AI Prompt Architect.</div>
      <div class="terminal-line">Type <span class="highlight">help</span> and press Enter to list all available shell operations.</div>
      <div class="terminal-line">&nbsp;</div>
      
      <!-- Input line template -->
      <div id="output-area"></div>

      <div class="input-line">
        <span class="prompt">guest@prompt-console:~$</span>
        <input type="text" id="terminal-input" autofocus autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
